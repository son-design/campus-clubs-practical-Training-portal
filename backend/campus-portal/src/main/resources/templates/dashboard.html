<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/dashboard" class="nav-brand">🏫 Campus Portal</a>
            <div class="nav-right">
                <span id="userName" class="nav-user"></span>
                <button onclick="logout()" class="btn btn-danger" style="padding:6px 16px;">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Clubs</h3>
                <p id="totalClubs">0</p>
            </div>
            <div class="stat-card">
                <h3>Trainings</h3>
                <p id="totalTrainings">0</p>
            </div>
            <div class="stat-card">
                <h3>My Clubs</h3>
                <p id="myClubs">0</p>
            </div>
            <div class="stat-card">
                <h3>Applications</h3>
                <p id="myApplications">0</p>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="dash-card">
                <h2>📋 Quick Actions</h2>
                <a href="/clubs" class="btn btn-primary" style="display:block; margin:10px 0;">View Clubs</a>
                <a href="/trainings" class="btn btn-primary" style="display:block; margin:10px 0;">View Trainings</a>
                <a href="/applications" class="btn btn-primary" style="display:block; margin:10px 0;">My Applications</a>
            </div>
            <div class="dash-card">
                <h2>📢 Recent Announcements</h2>
                <p style="color:#999;">No announcements yet</p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
