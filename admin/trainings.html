<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Trainings</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/dashboard.css">

</head>

<body onload="loadTrainings()">

<div class="sidebar">

<h2>Campus Portal</h2>

<a href="admin.html">Dashboard</a>
<a href="clubs.html">Clubs</a>
<a href="trainings.html" class="active">Trainings</a>
<a href="../profile.html">Profile</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<div class="content">

<h1>Manage Trainings</h1>

<div class="card">

<h2>Create Training</h2>

<input id="title" placeholder="Title">

<input id="organization" placeholder="Organization">

<input id="location" placeholder="Location">

<input id="availableSlots" type="number" placeholder="Available Slots">

<label>Start Date</label>
<input id="startDate" type="date">

<label>End Date</label>
<input id="endDate" type="date">

<label>Application Deadline</label>
<input id="applicationDeadline" type="date">

<textarea id="description" placeholder="Description"></textarea>

<textarea id="requirements" placeholder="Requirements"></textarea>

<button onclick="createTraining()">

Create Training

</button>

</div>

<br>

<h2>Existing Trainings</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Title</th>
<th>Organization</th>
<th>Location</th>
<th>Slots</th>
<th>Assign Mentor</th>

</tr>

</thead>

<tbody id="trainingTable">

</tbody>

</table>

</div>

<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/admin-trainings.js"></script>

</body>

</html>
