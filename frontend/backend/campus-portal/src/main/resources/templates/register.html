<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <h1>📝 <span>Register</span></h1>
        <p>Create your account</p>
        
        <div id="message" class="message"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Full name" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Password (min 6)" required>
            </div>
            <div class="form-group">
                <label>Registration Number</label>
                <input type="text" id="registrationNumber" placeholder="e.g., BIT001">
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" id="department" placeholder="e.g., CSIT">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="role">
                    <option value="STUDENT">Student</option>
                    <option value="MENTOR">Mentor</option>
                    <option value="CLUB_LEADER">Club Leader</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Register</button>
        </form>
        <p style="margin-top:15px; text-align:center;">
            Already have an account? <a href="/login">Login</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                fullName: document.getElementById('fullName').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                registrationNumber: document.getElementById('registrationNumber').value,
                department: document.getElementById('department').value,
                role: document.getElementById('role').value,
                yearOfStudy: 0
            };
            const msg = document.getElementById('message');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await res.json();

                if (res.ok) {
                    msg.className = 'message success';
                    msg.textContent = '✅ Registration successful! Redirecting...';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.message || 'Registration failed';
                }
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = 'Server not running!';
            }
        });
    </script>
</body>
</html>
