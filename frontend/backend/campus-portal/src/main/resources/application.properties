# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/campus_portal
spring.datasource.username=postgres
spring.datasource.password=1122
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Security Configuration
jwt.secret=campusPortalSecretKey2026SecureAndLongEnough1234567890
jwt.expiration=86400000

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# CORS Configuration
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500